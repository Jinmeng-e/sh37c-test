<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920, height=540, initial-scale=1.0">
<title>SH37C Player</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
video {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; object-fit: cover;
}
</style>
</head>
<body>

<video id="vA" autoplay loop playsinline></video>
<video id="vB" loop playsinline style="visibility:hidden"></video>

<script>
var TOTAL = 12;
var BASE = 'https://github.com/Jinmeng-e/sh37c-test/releases/download/v1.0/';
var currentIndex = 0;
var vA = document.getElementById('vA');
var vB = document.getElementById('vB');
var front = vA;
var back = vB;
var loading = false;

function getFile(num) { return BASE + (num < 10 ? '0' + num : '' + num) + '.mp4'; }

function playTrack(idx) {
    if (idx < 0 || idx >= TOTAL || loading) return;
    currentIndex = idx;
    loading = true;
    back.src = getFile(idx + 1);
    back.oncanplay = function() {
        back.oncanplay = null;
        back.play();
        back.style.visibility = 'visible';
        back.style.zIndex = '2';
        front.style.zIndex = '1';
        setTimeout(function() {
            front.pause();
            front.style.visibility = 'hidden';
            front.src = '';
            var tmp = front;
            front = back;
            back = tmp;
            loading = false;
        }, 100);
    };
    back.onerror = function() { loading = false; };
}

/* ── IR Remote ── */
document.addEventListener('keydown', function(e) {
    var code = e.keyCode;
    var ch = 0;
    if (code === 49 || code === 97)  ch = 1;
    if (code === 50 || code === 98)  ch = 2;
    if (code === 51 || code === 99)  ch = 3;
    if (code === 52 || code === 100) ch = 4;
    if (code === 53 || code === 101) ch = 5;
    if (code === 54 || code === 102) ch = 6;
    if (code === 55 || code === 103) ch = 7;
    if (code === 56 || code === 104) ch = 8;
    if (code === 57 || code === 105) ch = 9;
    if (code === 48 || code === 96)  ch = 10;
    if (code === 404) ch = 11;
    if (code === 405) ch = 12;
    if (ch >= 1 && ch <= TOTAL) playTrack(ch - 1);
});

/* 첫 영상 */
front.src = getFile(1);
front.style.zIndex = '2';
front.style.visibility = 'visible';
</script>
</body>
</html>
