<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920, height=540, initial-scale=1.0">
<title>SH37C Player</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
video {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; object-fit: cover;
}
</style>
</head>
<body>

<video id="vA" loop playsinline preload="auto" muted></video>
<video id="vB" loop playsinline preload="auto" muted style="visibility:hidden"></video>

<script>
var TOTAL = 12;
var BASE = 'videos/';
var currentIndex = -1;
var blobUrls = {};
var loadCount = 0;
var vA = document.getElementById('vA');
var vB = document.getElementById('vB');
var front = vA;
var back = vB;

function getFile(num) { return BASE + (num < 10 ? '0' + num : '' + num) + '.webm'; }

/* ── XHR로 Blob 다운로드 (fetch 대신, 호환성 높음) ── */
function downloadBlob(idx, callback) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', getFile(idx + 1), true);
    xhr.responseType = 'blob';
    xhr.onload = function() {
        if (xhr.status === 200) {
            blobUrls[idx] = URL.createObjectURL(xhr.response);
        } else {
            blobUrls[idx] = getFile(idx + 1);
        }
        callback();
    };
    xhr.onerror = function() {
        blobUrls[idx] = getFile(idx + 1);
        callback();
    };
    xhr.send();
}

/* ── 전부 다운로드 후 콜백 ── */
function preloadAll(done) {
    for (var i = 0; i < TOTAL; i++) {
        downloadBlob(i, function() {
            loadCount++;
            if (loadCount >= TOTAL) done();
        });
    }
}

/* ── 채널 전환 ── */
function playTrack(idx) {
    if (idx < 0 || idx >= TOTAL) return;
    if (idx === currentIndex) return;

    back.oncanplay = null;
    currentIndex = idx;

    var url = blobUrls[idx] || getFile(idx + 1);
    back.src = url;
    back.load();
    back.style.visibility = 'hidden';
    back.style.zIndex = '3';
    front.style.zIndex = '2';

    back.oncanplay = function() {
        back.oncanplay = null;
        back.play();
        back.style.visibility = 'visible';
        front.pause();
        front.style.visibility = 'hidden';
        var tmp = front;
        front = back;
        back = tmp;
    };
}

/* ── IR Remote ── */
document.addEventListener('keydown', function(e) {
    var code = e.keyCode;
    var ch = 0;
    if (code === 49 || code === 97)  ch = 1;
    if (code === 50 || code === 98)  ch = 2;
    if (code === 51 || code === 99)  ch = 3;
    if (code === 52 || code === 100) ch = 4;
    if (code === 53 || code === 101) ch = 5;
    if (code === 54 || code === 102) ch = 6;
    if (code === 55 || code === 103) ch = 7;
    if (code === 56 || code === 104) ch = 8;
    if (code === 57 || code === 105) ch = 9;
    if (code === 48 || code === 96)  ch = 10;
    if (code === 404) ch = 11;
    if (code === 405) ch = 12;
    if (ch >= 1 && ch <= TOTAL) playTrack(ch - 1);
});

/* ── 시작: XHR로 전부 다운 → Blob URL로 재생 ── */
preloadAll(function() {
    console.log('[Ready] All ' + TOTAL + ' videos preloaded as blobs');
    playTrack(0);
});
</script>
</body>
</html>
