<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920, height=540, initial-scale=1.0">
<title>SH37C Player</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
video {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; object-fit: cover;
}
#status {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    color: #0f0; font-family: monospace; font-size: 18px;
    text-align: center; white-space: pre-wrap; z-index: 10;
}
</style>
</head>
<body>

<video id="playerA" autoplay playsinline></video>
<video id="playerB" playsinline style="opacity:0"></video>
<div id="status"></div>

<script>
var TOTAL = 12;
var BASE = 'https://github.com/Jinmeng-e/sh37c-test/releases/download/v1.0/';
var currentIndex = 0;
var playerA = document.getElementById('playerA');
var playerB = document.getElementById('playerB');
var active = playerA;
var standby = playerB;
var statusEl = document.getElementById('status');

function setStatus(msg) { statusEl.textContent = msg; }
function hideStatus() { statusEl.textContent = ''; }

function getFile(num) { return BASE + (num < 10 ? '0' + num : '' + num) + '.mp4'; }

function swap() {
    standby.style.opacity = '1';
    standby.style.zIndex = '2';
    standby.play();
    active.style.opacity = '0';
    active.style.zIndex = '1';
    setTimeout(function() { active.pause(); }, 500);
    var tmp = active;
    active = standby;
    standby = tmp;
}

function playTrack(idx) {
    if (idx < 0 || idx >= TOTAL) return;
    currentIndex = idx;
    var src = getFile(idx + 1);
    standby.src = src;
    standby.oncanplay = function() {
        standby.oncanplay = null;
        hideStatus();
        swap();
    };
    standby.onerror = function() {
        setStatus('ERROR: CH ' + (idx + 1) + ' load failed');
    };
}

/* loop current track */
playerA.addEventListener('ended', function() { playerA.currentTime = 0; playerA.play(); });
playerB.addEventListener('ended', function() { playerB.currentTime = 0; playerB.play(); });

/* ── IR Remote ── */
document.addEventListener('keydown', function(e) {
    var code = e.keyCode;
    var ch = 0;
    if (code === 49 || code === 97)  ch = 1;
    if (code === 50 || code === 98)  ch = 2;
    if (code === 51 || code === 99)  ch = 3;
    if (code === 52 || code === 100) ch = 4;
    if (code === 53 || code === 101) ch = 5;
    if (code === 54 || code === 102) ch = 6;
    if (code === 55 || code === 103) ch = 7;
    if (code === 56 || code === 104) ch = 8;
    if (code === 57 || code === 105) ch = 9;
    if (code === 48 || code === 96)  ch = 10;
    if (code === 404) ch = 11;
    if (code === 405) ch = 12;
    if (ch >= 1 && ch <= TOTAL) playTrack(ch - 1);
});

/* 첫 트랙 직접 로드 */
active.src = getFile(1);
active.oncanplay = function() {
    active.oncanplay = null;
    hideStatus();
    active.style.opacity = '1';
    active.style.zIndex = '2';
    active.play();
};
setStatus('Loading...');
</script>
</body>
</html>
