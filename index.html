<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920, height=540, initial-scale=1.0">
<title>SH37C Player</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
video {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; object-fit: cover;

}
</style>
</head>
<body>

<video id="vA" loop playsinline preload="auto" muted></video>
<video id="vB" loop playsinline preload="auto" muted style="visibility:hidden"></video>

<script>
var TOTAL = 12;
var BASE = 'https://pub-4702f6b2fa2043cba545ed8b55e7f952.r2.dev/';
var currentIndex = 0;
var vA = document.getElementById('vA');
var vB = document.getElementById('vB');
var front = vA;
var back = vB;
var swapTimer = null;
var pendingIdx = -1;

function getFile(num) { return BASE + (num < 10 ? '0' + num : '' + num) + '.webm'; }

function cancelPending() {
    if (swapTimer) { clearTimeout(swapTimer); swapTimer = null; }
    back.oncanplay = null;
    back.onerror = null;
    back.pause();
    back.removeAttribute('src');
    back.style.opacity = '0';
    back.style.visibility = 'hidden';
    pendingIdx = -1;
}

function playTrack(idx) {
    if (idx < 0 || idx >= TOTAL) return;
    if (idx === currentIndex && front.src) return;

    /* 이전 전환 진행중이면 즉시 취소 */
    cancelPending();

    currentIndex = idx;
    pendingIdx = idx;

    /* 뒤에서 새 영상 로드 (현재 영상은 계속 재생) */
    back.preload = 'auto';
    back.src = getFile(idx + 1);
    back.load();
    back.style.opacity = '0';
    back.style.visibility = 'visible';
    back.style.zIndex = '3';
    front.style.zIndex = '2';

    var requestedIdx = idx;
    back.oncanplay = function() {
        back.oncanplay = null;
        if (pendingIdx !== requestedIdx) return; /* 이미 다른 채널 요청됨 */
        back.play();
        back.style.opacity = '1';
        front.pause();
        front.style.visibility = 'hidden';
        front.style.opacity = '0';
        front.removeAttribute('src');
        front.load();
        var tmp = front;
        front = back;
        back = tmp;
        pendingIdx = -1;
    };
    back.onerror = function() { pendingIdx = -1; };
}

/* ── IR Remote ── */
document.addEventListener('keydown', function(e) {
    var code = e.keyCode;
    var ch = 0;
    if (code === 49 || code === 97)  ch = 1;
    if (code === 50 || code === 98)  ch = 2;
    if (code === 51 || code === 99)  ch = 3;
    if (code === 52 || code === 100) ch = 4;
    if (code === 53 || code === 101) ch = 5;
    if (code === 54 || code === 102) ch = 6;
    if (code === 55 || code === 103) ch = 7;
    if (code === 56 || code === 104) ch = 8;
    if (code === 57 || code === 105) ch = 9;
    if (code === 48 || code === 96)  ch = 10;
    if (code === 404) ch = 11;
    if (code === 405) ch = 12;
    if (ch >= 1 && ch <= TOTAL) playTrack(ch - 1);
});

/* 첫 영상 - 충분히 버퍼링 후 재생 */
front.src = getFile(1);
front.load();
front.oncanplay = function() {
    front.oncanplay = null;
    front.style.zIndex = '2';
    front.style.visibility = 'visible';
    front.play();
};
</script>
</body>
</html>
