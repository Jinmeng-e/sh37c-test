<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920, height=540, initial-scale=1.0">
<title>SH37C Player</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
video {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; object-fit: cover;
}
</style>
</head>
<body>

<video id="vA" loop playsinline muted></video>
<video id="vB" loop playsinline muted style="visibility:hidden"></video>

<script>
var TOTAL = 12;
var BASE = 'https://pub-4702f6b2fa2043cba545ed8b55e7f952.r2.dev/';
var currentIndex = -1;
var blobUrls = [];   /* 메모리에 캐시된 blob URL */
var vA = document.getElementById('vA');
var vB = document.getElementById('vB');
var front = vA;
var back = vB;

function getFile(num) { return BASE + (num < 10 ? '0' + num : '' + num) + '.webm'; }

/* ── 모든 영상을 Blob으로 미리 다운로드 ── */
function preloadAll() {
    var promises = [];
    for (var i = 0; i < TOTAL; i++) {
        (function(idx) {
            var p = fetch(getFile(idx + 1))
                .then(function(r) { return r.blob(); })
                .then(function(blob) {
                    blobUrls[idx] = URL.createObjectURL(blob);
                    console.log('[Preload] ' + (idx+1) + '/' + TOTAL + ' done');
                })
                .catch(function(e) {
                    /* 실패하면 원본 URL 사용 */
                    blobUrls[idx] = getFile(idx + 1);
                    console.log('[Preload] ' + (idx+1) + ' failed, using URL');
                });
            promises.push(p);
        })(i);
    }
    return Promise.all(promises);
}

/* ── 채널 전환 ── */
function playTrack(idx) {
    if (idx < 0 || idx >= TOTAL) return;
    if (idx === currentIndex) return;

    currentIndex = idx;
    var url = blobUrls[idx] || getFile(idx + 1);

    back.src = url;
    back.load();
    back.style.visibility = 'visible';
    back.style.zIndex = '3';
    front.style.zIndex = '2';

    back.oncanplay = function() {
        back.oncanplay = null;
        back.play();
        front.pause();
        front.style.visibility = 'hidden';
        front.removeAttribute('src');
        front.load();
        var tmp = front;
        front = back;
        back = tmp;
    };
}

/* ── IR Remote ── */
document.addEventListener('keydown', function(e) {
    var code = e.keyCode;
    var ch = 0;
    if (code === 49 || code === 97)  ch = 1;
    if (code === 50 || code === 98)  ch = 2;
    if (code === 51 || code === 99)  ch = 3;
    if (code === 52 || code === 100) ch = 4;
    if (code === 53 || code === 101) ch = 5;
    if (code === 54 || code === 102) ch = 6;
    if (code === 55 || code === 103) ch = 7;
    if (code === 56 || code === 104) ch = 8;
    if (code === 57 || code === 105) ch = 9;
    if (code === 48 || code === 96)  ch = 10;
    if (code === 404) ch = 11;
    if (code === 405) ch = 12;
    if (ch >= 1 && ch <= TOTAL) playTrack(ch - 1);
});

/* ── Service Worker 등록 (캐시) ── */
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(function(reg) {
        console.log('[SW] registered', reg.scope);
    }).catch(function(err) {
        console.log('[SW] registration failed', err);
    });
}

/* ── 시작: 전부 다운로드 후 첫 영상 재생 ── */
preloadAll().then(function() {
    console.log('[Ready] All videos in memory');
    playTrack(0);
});
</script>
</body>
</html>
