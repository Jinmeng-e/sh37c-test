<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920, height=540, initial-scale=1.0">
<title>SH37C Video Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
video { width: 100%; height: 100%; object-fit: cover; }
#log {
    position: absolute; top: 10px; left: 10px; right: 10px;
    color: #0f0; font-family: monospace; font-size: 22px;
    background: rgba(0,0,0,0.8); padding: 20px;
    white-space: pre-wrap; max-height: 100%; overflow-y: auto;
}
</style>
</head>
<body>

<video id="player" autoplay muted loop playsinline></video>
<div id="log">SH37C Video Test\n</div>

<script>
var video = document.getElementById('player');
var logEl = document.getElementById('log');

function log(msg) {
    logEl.textContent += '\n' + msg;
}

log('Viewport: ' + window.innerWidth + 'x' + window.innerHeight);
log('Screen: ' + screen.width + 'x' + screen.height);
log('UserAgent: ' + navigator.userAgent);

var sources = [
    'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4',
    'https://www.w3schools.com/html/mov_bbb.mp4',
    'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4'
];

var currentSource = 0;

function trySource(idx) {
    if (idx >= sources.length) {
        log('ALL SOURCES FAILED');
        return;
    }
    log('Trying source ' + (idx+1) + '/' + sources.length + '...');
    log('URL: ' + sources[idx]);
    video.src = sources[idx];
    video.load();
}

video.addEventListener('loadstart', function() { log('Event: loadstart'); });
video.addEventListener('loadedmetadata', function() {
    log('Event: loadedmetadata - ' + video.videoWidth + 'x' + video.videoHeight);
});
video.addEventListener('loadeddata', function() { log('Event: loadeddata'); });
video.addEventListener('canplay', function() { log('Event: canplay'); });
video.addEventListener('playing', function() {
    log('PLAYING OK! ' + video.videoWidth + 'x' + video.videoHeight);
    setTimeout(function() { logEl.style.display = 'none'; }, 3000);
});
video.addEventListener('waiting', function() { log('Event: waiting (buffering)'); });
video.addEventListener('stalled', function() { log('Event: stalled'); });

video.addEventListener('error', function() {
    var code = video.error ? video.error.code : '?';
    var msg = video.error ? video.error.message : 'unknown';
    log('ERROR code=' + code + ' msg=' + msg);
    log('Trying next source...');
    currentSource++;
    trySource(currentSource);
});

trySource(0);
</script>
</body>
</html>
