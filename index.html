<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920, height=540, initial-scale=1.0">
<title>SH37C Player</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
video { width: 100%; height: 100%; object-fit: cover; }
#overlay {
    display: none; position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%); color: white; font-family: monospace;
    font-size: 20px; background: rgba(0,0,0,0.7); padding: 10px 20px;
    border-radius: 8px; z-index: 10;
}
#status {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    color: #0f0; font-family: monospace; font-size: 18px;
    text-align: center; white-space: pre-wrap; z-index: 10;
}
</style>
</head>
<body>

<video id="player" autoplay playsinline></video>
<div id="overlay"></div>
<div id="status"></div>

<script>
var TOTAL = 12;
var BASE = '/home/owner/share/magicinfo/content/';
var currentIndex = 0;
var video = document.getElementById('player');
var overlayEl = document.getElementById('overlay');
var statusEl = document.getElementById('status');

function showOverlay(text) {
    overlayEl.textContent = text;
    overlayEl.style.display = 'block';
    setTimeout(function() { overlayEl.style.display = 'none'; }, 3000);
}

function setStatus(msg) { statusEl.textContent = msg; }
function hideStatus() { statusEl.textContent = ''; }

function getFile(num) { return BASE + (num < 10 ? '0' + num : '' + num) + '.mp4'; }

function playTrack(idx) {
    if (idx < 0 || idx >= TOTAL) return;
    currentIndex = idx;
    var src = getFile(idx + 1);
    setStatus('Loading CH ' + (idx+1) + '...\n' + src);
    video.src = src;
    video.play();
    showOverlay('CH ' + (idx + 1));
}

video.addEventListener('loadeddata', function() { hideStatus(); });

video.addEventListener('ended', function() {
    playTrack(currentIndex);
});

video.addEventListener('error', function() {
    setStatus('ERROR: ' + getFile(currentIndex + 1) + '\nnot found');
});

/* ── IR Remote ── */
document.addEventListener('keydown', function(e) {
    var code = e.keyCode;
    showOverlay('keyCode: ' + code);
    var ch = 0;
    if (code === 49 || code === 97)  ch = 1;
    if (code === 50 || code === 98)  ch = 2;
    if (code === 51 || code === 99)  ch = 3;
    if (code === 52 || code === 100) ch = 4;
    if (code === 53 || code === 101) ch = 5;
    if (code === 54 || code === 102) ch = 6;
    if (code === 55 || code === 103) ch = 7;
    if (code === 56 || code === 104) ch = 8;
    if (code === 57 || code === 105) ch = 9;
    if (code === 48 || code === 96)  ch = 10;
    if (code === 404) ch = 11;
    if (code === 405) ch = 12;
    if (ch >= 1 && ch <= TOTAL) playTrack(ch - 1);
});

playTrack(0);
</script>
</body>
</html>
