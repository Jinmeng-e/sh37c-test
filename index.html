<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920, height=540, initial-scale=1.0">
<title>SH37C Player</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
video {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; object-fit: cover;
    visibility: hidden;
}
</style>
</head>
<body>

<script>
var TOTAL = 12;
var BASE = 'videos/';
var currentIndex = -1;
var videos = [];
var blobUrls = {};
var dlCount = 0;
var readyCount = 0;

function getFile(num) { return BASE + (num < 10 ? '0' + num : '' + num) + '.webm'; }

/* ── 1단계: XHR로 Blob 전부 다운로드 ── */
function downloadAll(done) {
    for (var i = 0; i < TOTAL; i++) {
        (function(idx) {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', getFile(idx + 1), true);
            xhr.responseType = 'blob';
            xhr.onload = function() {
                blobUrls[idx] = (xhr.status === 200)
                    ? URL.createObjectURL(xhr.response)
                    : getFile(idx + 1);
                dlCount++;
                if (dlCount >= TOTAL) done();
            };
            xhr.onerror = function() {
                blobUrls[idx] = getFile(idx + 1);
                dlCount++;
                if (dlCount >= TOTAL) done();
            };
            xhr.send();
        })(i);
    }
}

/* ── 2단계: video 태그 만들고 전부 로드 (pause 상태, 첫 프레임 대기) ── */
function loadAll(done) {
    var loaded = 0;
    for (var i = 0; i < TOTAL; i++) {
        (function(idx) {
            var v = document.createElement('video');
            v.loop = true;
            v.muted = true;
            v.playsInline = true;
            v.preload = 'auto';
            v.src = blobUrls[idx];
            v.onloadeddata = function() {
                v.onloadeddata = null;
                v.currentTime = 0;
                loaded++;
                console.log('[Load] ' + loaded + '/' + TOTAL);
                if (loaded >= TOTAL) done();
            };
            /* 5초 안에 로드 안 되면 그냥 진행 */
            setTimeout(function() {
                if (v.onloadeddata) { v.onloadeddata = null; loaded++; if (loaded >= TOTAL) done(); }
            }, 5000);
            v.load();
            document.body.appendChild(v);
            videos[idx] = v;
        })(i);
    }
}

/* ── 채널 전환: show + play / hide + pause + reset ── */
function playTrack(idx) {
    if (idx < 0 || idx >= TOTAL) return;
    if (idx === currentIndex) return;

    if (currentIndex >= 0) {
        videos[currentIndex].pause();
        videos[currentIndex].style.visibility = 'hidden';
        videos[currentIndex].currentTime = 0;
    }
    currentIndex = idx;
    videos[idx].style.visibility = 'visible';
    videos[idx].play();
}

/* ── IR Remote ── */
document.addEventListener('keydown', function(e) {
    var code = e.keyCode;
    var ch = 0;
    if (code === 49 || code === 97)  ch = 1;
    if (code === 50 || code === 98)  ch = 2;
    if (code === 51 || code === 99)  ch = 3;
    if (code === 52 || code === 100) ch = 4;
    if (code === 53 || code === 101) ch = 5;
    if (code === 54 || code === 102) ch = 6;
    if (code === 55 || code === 103) ch = 7;
    if (code === 56 || code === 104) ch = 8;
    if (code === 57 || code === 105) ch = 9;
    if (code === 48 || code === 96)  ch = 10;
    if (code === 404) ch = 11;
    if (code === 405) ch = 12;
    if (ch >= 1 && ch <= TOTAL) playTrack(ch - 1);
});

/* ── 시작 ── */
downloadAll(function() {
    console.log('[1/2] All blobs downloaded');
    loadAll(function() {
        console.log('[2/2] All videos loaded at frame 0');
        playTrack(0);
    });
});
</script>
</body>
</html>
