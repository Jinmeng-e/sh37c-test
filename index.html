<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920, height=540, initial-scale=1.0">
<title>SH37C Video Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}
video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
#status {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    font-size: 32px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}
#info {
    position: absolute;
    bottom: 10px;
    right: 10px;
    color: rgba(255,255,255,0.7);
    font-family: monospace;
    font-size: 18px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
}
</style>
</head>
<body>

<video id="player" autoplay muted loop></video>
<div id="status">Loading...</div>
<div id="info"></div>

<script>
var video = document.getElementById('player');
var status = document.getElementById('status');
var info = document.getElementById('info');

// Sample 4K video (Big Buck Bunny - public domain)
var testUrl = 'https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/2160/Big_Buck_Bunny_2160_10s_1MB.mp4';

video.src = testUrl;

video.addEventListener('loadeddata', function() {
    status.style.display = 'none';
    info.textContent = video.videoWidth + 'x' + video.videoHeight +
        ' | viewport: ' + window.innerWidth + 'x' + window.innerHeight;
});

video.addEventListener('error', function(e) {
    status.textContent = 'VIDEO ERROR: ' + (video.error ? video.error.message : 'unknown');
    status.style.color = '#ff4444';
});

video.addEventListener('playing', function() {
    status.style.display = 'none';
});

// Show viewport info
info.textContent = 'viewport: ' + window.innerWidth + 'x' + window.innerHeight;
</script>
</body>
</html>
