<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920, height=540, initial-scale=1.0">
<title>SH37C Player</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
video {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; object-fit: cover;
    visibility: hidden;
}
video.active {
    visibility: visible;
    z-index: 2;
}
</style>
</head>
<body>

<script>
var TOTAL = 12;
var BASE = 'https://pub-4702f6b2fa2043cba545ed8b55e7f952.r2.dev/';
var currentIndex = -1;
var videos = [];

function getFile(num) { return BASE + (num < 10 ? '0' + num : '' + num) + '.webm'; }

/* ── 12개 비디오 태그 미리 생성 + 프리로드 ── */
for (var i = 0; i < TOTAL; i++) {
    var v = document.createElement('video');
    v.loop = true;
    v.muted = true;
    v.playsInline = true;
    v.preload = 'auto';
    v.src = getFile(i + 1);
    v.load();
    document.body.appendChild(v);
    videos.push(v);
}

/* ── 채널 전환: show/hide만 (즉시 전환) ── */
function playTrack(idx) {
    if (idx < 0 || idx >= TOTAL) return;
    if (idx === currentIndex) return;

    /* 이전 영상 숨기고 일시정지 */
    if (currentIndex >= 0) {
        videos[currentIndex].classList.remove('active');
        videos[currentIndex].pause();
    }

    currentIndex = idx;
    var v = videos[idx];
    v.currentTime = 0;
    v.classList.add('active');
    v.play();
}

/* ── IR Remote ── */
document.addEventListener('keydown', function(e) {
    var code = e.keyCode;
    var ch = 0;
    if (code === 49 || code === 97)  ch = 1;
    if (code === 50 || code === 98)  ch = 2;
    if (code === 51 || code === 99)  ch = 3;
    if (code === 52 || code === 100) ch = 4;
    if (code === 53 || code === 101) ch = 5;
    if (code === 54 || code === 102) ch = 6;
    if (code === 55 || code === 103) ch = 7;
    if (code === 56 || code === 104) ch = 8;
    if (code === 57 || code === 105) ch = 9;
    if (code === 48 || code === 96)  ch = 10;
    if (code === 404) ch = 11;
    if (code === 405) ch = 12;
    if (ch >= 1 && ch <= TOTAL) playTrack(ch - 1);
});

/* ── Service Worker 등록 (캐시) ── */
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(function(reg) {
        console.log('[SW] registered', reg.scope);
    }).catch(function(err) {
        console.log('[SW] registration failed', err);
    });
}

/* 첫 영상 자동 재생 */
playTrack(0);
</script>
</body>
</html>
