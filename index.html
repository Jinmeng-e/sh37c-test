<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920, height=540, initial-scale=1.0">
<title>SH37C Player</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
#log {
    color: #0f0; font-family: monospace; font-size: 18px;
    padding: 20px; overflow-y: auto; height: 100%;
    white-space: pre-wrap;
}
</style>
</head>
<body>
<div id="log"></div>

<script>
var log = document.getElementById('log');
function addLog(msg, color) {
    var p = document.createElement('div');
    p.textContent = msg;
    p.style.color = color || '#0f0';
    log.appendChild(p);
    log.scrollTop = log.scrollHeight;
}

var PATHS = [
    '/opt/usr/media/',
    '/opt/usr/media/Videos/',
    '/opt/usr/media/video/',
    '/opt/usr/media/magicinfo/',
    '/opt/usr/media/magicinfo/content/',
    '/opt/usr/data/magicinfo/',
    '/opt/usr/home/magicinfo/',
    '/opt/storage/sdcard/',
    '/opt/storage/sdcard/Videos/',
    '/opt/usr/apps/magicinfo/',
    '/opt/usr/content/',
    '/opt/usr/home/content/',
    '/media/internal/',
    '/media/internal/Videos/',
    '/opt/usr/home/owner/media/',
    '/opt/usr/home/owner/media/Videos/',
    '/home/owner/media/',
    '/home/owner/media/Videos/'
];

var testFile = '01.mp4';
var found = false;
var tested = 0;

function tryPath(i) {
    if (i >= PATHS.length) {
        addLog('---', '#fff');
        addLog('ALL PATHS TESTED. None worked.', '#f00');
        addLog('Tested ' + tested + ' paths total.', '#ff0');
        return;
    }
    var url = PATHS[i] + testFile;
    addLog('Testing: ' + url + ' ...', '#aaa');

    var v = document.createElement('video');
    v.preload = 'metadata';
    v.onloadedmetadata = function() {
        addLog('✓ FOUND: ' + PATHS[i], '#0f0');
        found = true;
        tested++;
        tryPath(i + 1);
    };
    v.onerror = function() {
        addLog('✗ ' + PATHS[i], '#666');
        tested++;
        tryPath(i + 1);
    };
    v.src = url;
    setTimeout(function() {
        if (!v.readyState) {
            addLog('✗ timeout ' + PATHS[i], '#666');
            tested++;
            v.src = '';
            tryPath(i + 1);
        }
    }, 3000);
}

addLog('=== Path Scanner ===', '#ff0');
addLog('Looking for: ' + testFile, '#fff');
addLog('MagicInfo로 01.mp4를 먼저 전송해주세요', '#ff0');
addLog('---', '#fff');
tryPath(0);
</script>
</body>
</html>
