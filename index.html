<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920, height=540, initial-scale=1.0">
<title>SH37C Player</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
video {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; object-fit: cover;
    display: none;
}
video.active { display: block; }
</style>
</head>
<body>

<script>
var TOTAL = 12;
var BASE = 'https://pub-4702f6b2fa2043cba545ed8b55e7f952.r2.dev/';
var currentIndex = -1;
var videos = [];
var ready = 0;

function getFile(num) { return BASE + (num < 10 ? '0' + num : '' + num) + '.webm'; }

/* ── 1단계: 모든 영상을 Blob으로 다운로드 ── */
function downloadAll() {
    var promises = [];
    for (var i = 0; i < TOTAL; i++) {
        (function(idx) {
            promises.push(
                fetch(getFile(idx + 1))
                    .then(function(r) { return r.blob(); })
                    .then(function(blob) {
                        return URL.createObjectURL(blob);
                    })
            );
        })(i);
    }
    return Promise.all(promises);
}

/* ── 2단계: Blob URL로 video 태그 하나씩 순차 로드 ── */
function loadVideo(idx, blobUrl) {
    return new Promise(function(resolve) {
        var v = document.createElement('video');
        v.loop = true;
        v.muted = true;
        v.playsInline = true;
        v.preload = 'auto';
        v.src = blobUrl;
        v.oncanplaythrough = function() {
            v.oncanplaythrough = null;
            console.log('[Ready] video ' + (idx+1));
            resolve();
        };
        /* 3초 안에 canplaythrough 안 오면 그냥 진행 */
        setTimeout(function() { v.oncanplaythrough = null; resolve(); }, 3000);
        v.load();
        document.body.appendChild(v);
        videos[idx] = v;
    });
}

/* ── 채널 전환: display 토글만 (즉시) ── */
function playTrack(idx) {
    if (idx < 0 || idx >= TOTAL) return;
    if (idx === currentIndex) return;

    if (currentIndex >= 0 && videos[currentIndex]) {
        videos[currentIndex].pause();
        videos[currentIndex].classList.remove('active');
    }

    currentIndex = idx;
    videos[idx].currentTime = 0;
    videos[idx].classList.add('active');
    videos[idx].play();
}

/* ── IR Remote ── */
document.addEventListener('keydown', function(e) {
    var code = e.keyCode;
    var ch = 0;
    if (code === 49 || code === 97)  ch = 1;
    if (code === 50 || code === 98)  ch = 2;
    if (code === 51 || code === 99)  ch = 3;
    if (code === 52 || code === 100) ch = 4;
    if (code === 53 || code === 101) ch = 5;
    if (code === 54 || code === 102) ch = 6;
    if (code === 55 || code === 103) ch = 7;
    if (code === 56 || code === 104) ch = 8;
    if (code === 57 || code === 105) ch = 9;
    if (code === 48 || code === 96)  ch = 10;
    if (code === 404) ch = 11;
    if (code === 405) ch = 12;
    if (ch >= 1 && ch <= TOTAL) playTrack(ch - 1);
});

/* ── Service Worker 등록 ── */
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(function(reg) {
        console.log('[SW] registered', reg.scope);
    }).catch(function(err) {
        console.log('[SW] reg failed', err);
    });
}

/* ── 시작: Blob 다운로드 → 순차 로드 → 첫 영상 재생 ── */
console.log('[Start] Downloading all videos...');
downloadAll().then(function(blobUrls) {
    console.log('[Start] All downloaded, loading video tags...');
    var chain = Promise.resolve();
    blobUrls.forEach(function(url, idx) {
        chain = chain.then(function() { return loadVideo(idx, url); });
    });
    return chain;
}).then(function() {
    console.log('[Start] All ready, playing ch1');
    playTrack(0);
});
</script>
</body>
</html>
